
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whois IP Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #111827;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-left: 4px;
        }
        .card-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card {
            background-color: #1f2937;
            border-radius: 12px;
            padding: 16px;
        }
        .card-title {
            color: #9ca3af;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .card-value {
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
        }
        .card-sub {
            color: #6b7280;
            font-size: 12px;
            margin-top: 4px;
        }
        .ua-box {
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.4;
            color: #9ca3af;
        }
    </style>
</head>
<body>

    <div class="header">IP Bilgileriniz</div>

    <div class="card-container">
        <div class="card">
            <div class="card-title">IP ADRESİ</div>
            <div class="card-value" id="ip">Yükleniyor...</div>
            <div class="card-sub" id="isp">-</div>
        </div>

        <div class="card">
            <div class="card-title">ÜLKE</div>
            <div class="card-value" id="country">-</div>
        </div>

        <div class="card">
            <div class="card-title">CİHAZ</div>
            <div class="card-value" id="device">-</div>
        </div>

        <div class="card">
            <div class="card-title">İŞLETİM SİSTEMİ</div>
            <div class="card-value" id="os">-</div>
        </div>

        <div class="card">
            <div class="card-title">TARAYICI</div>
            <div class="card-value" id="browser">-</div>
        </div>

        <div class="card">
            <div class="card-title">USER-AGENT</div>
            <div class="card-value ua-box" id="user_agent">-</div>
        </div>
    </div>

    <script>
        // Telegram WebApp-y işe girizýäris
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // Ekranı doly açar
        }

        // Öz proxy/serweriňizden hakyky dynamic maglumatlary çekýäris
        fetch('/api/ip-bilgileri')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip').innerText = data.ip;
                document.getElementById('isp').innerText = data.isp + " tarafından";
                document.getElementById('country').innerText = data.country;
                document.getElementById('device').innerText = data.device;
                document.getElementById('os').innerText = data.os;
                document.getElementById('browser').innerText = data.browser;
                document.getElementById('user_agent').innerText = data.user_agent;
            })
            .catch(err => {
                console.error("Hata:", err);
                document.getElementById('ip').innerText = "Bağlantı hatası";
            });
    </script>
</body>
</html>
