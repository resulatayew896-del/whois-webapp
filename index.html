<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whois IP Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: sans-serif; margin: 0; padding: 16px; }
        .header { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        .card-container { display: flex; flex-direction: column; gap: 12px; }
        .card { background-color: #1f2937; border-radius: 12px; padding: 16px; }
        .card-title { color: #9ca3af; font-size: 11px; text-transform: uppercase; margin-bottom: 6px; }
        .card-value { color: #ffffff; font-size: 16px; font-weight: 600; }
        .card-sub { color: #6b7280; font-size: 12px; margin-top: 4px; }
        .ua-box { word-break: break-all; font-family: monospace; font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>
    <div class="header">IP Bilgileriniz</div>
    <div class="card-container">
        <div class="card">
            <div class="card-title">IP ADRESİ</div>
            <div class="card-value" id="ip">Yükleniyor...</div>
            <div class="card-sub" id="isp">-</div>
        </div>
        <div class="card">
            <div class="card-title">ÜLKE</div>
            <div class="card-value" id="country">-</div>
        </div>
        <div class="card">
            <div class="card-title">ŞEHİR</div>
            <div class="card-value" id="city">-</div>
        </div>
        <div class="card">
            <div class="card-title">CİHAZ</div>
            <div class="card-value" id="device">-</div>
        </div>
        <div class="card">
            <div class="card-title">İŞLETİM SİSTEMİ</div>
            <div class="card-value" id="os">-</div>
        </div>
        <div class="card">
            <div class="card-title">TARAYICI</div>
            <div class="card-value" id="browser">-</div>
        </div>
        <div class="card">
            <div class="card-title">USER-AGENT</div>
            <div class="card-value ua-box" id="user_agent">-</div>
        </div>
    </div>
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // Göni internet API-den maglumaty çekmek (Tünelsiz professional ýol)
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                document.getElementById('ip').innerText = data.ip || "-";
                document.getElementById('isp').innerText = data.org || "Bilinmiyor";
                document.getElementById('country').innerText = data.country_name || "-";
                document.getElementById('city').innerText = data.city || "-";
                
                // User Agent maglumatlaryny brauzeriň özünden okamak
                const uaStr = navigator.userAgent;
                document.getElementById('user_agent').innerText = uaStr;

                // OS we Tarayıcı tapmak
                let os = "Bilinmeyen OS";
                if (uaStr.indexOf("Android") !== -1) os = "Android";
                else if (uaStr.indexOf("iPhone") !== -1) os = "iOS";
                else if (uaStr.indexOf("Windows") !== -1) os = "Windows";
                document.getElementById('os').innerText = os;

                let browser = "Bilinmeyen Tarayıcı";
                if (uaStr.indexOf("Chrome") !== -1) browser = "Chrome";
                else if (uaStr.indexOf("Firefox") !== -1) browser = "Firefox";
                else if (uaStr.indexOf("Safari") !== -1) browser = "Safari";
                document.getElementById('browser').innerText = browser;

                // Cihaz tapmak
                let device = "Mobil Cihaz";
                if (uaStr.indexOf("Samsung") !== -1 || uaStr.indexOf("SM-") !== -1) {
                    device = "Samsung Device";
                } else if (uaStr.indexOf("iPhone") !== -1) {
                    device = "iPhone";
                }
                document.getElementById('device').innerText = device;
            })
            .catch(() => { 
                document.getElementById('ip').innerText = "Bağlantı hatası"; 
            });
    </script>
</body>
</html>
